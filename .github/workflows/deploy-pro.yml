name: Deploy Pro Client

on:
  workflow_dispatch:
    inputs:
      client_id:
        description: "External Pro client to deploy"
        required: true
        type: string
      action:
        description: "What to do"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - deploy-only
          - backend-only
          - admin-only
          - borrower-only
          - db-migrate
          - db-seed
          - db-migrate-and-seed
          - db-reset-and-seed
      platform_version:
        description: "Semantic version for admin_pro + backend_pro (for example 1.2.3)"
        required: false
        type: string
      borrower_version:
        description: "Optional semantic version for borrower app. Defaults to config value, then platform_version."
        required: false
        type: string
      skip_migrations:
        description: "Skip auto-migrations for full deploy"
        required: false
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  load-config:
    name: Load Client Config
    runs-on: ubuntu-latest

    outputs:
      client_id: ${{ steps.client.outputs.client_id }}
      client_type: ${{ steps.config.outputs.client_type }}
      github_environment: ${{ steps.config.outputs.github_environment }}
      aws_region: ${{ steps.config.outputs.aws_region }}
      borrower_app: ${{ steps.config.outputs.borrower_app }}
      ecr_backend: ${{ steps.config.outputs.ecr_backend }}
      ecr_admin: ${{ steps.config.outputs.ecr_admin }}
      ecr_borrower: ${{ steps.config.outputs.ecr_borrower }}
      ecs_cluster: ${{ steps.config.outputs.ecs_cluster }}
      ecs_backend_service: ${{ steps.config.outputs.ecs_backend_service }}
      ecs_admin_service: ${{ steps.config.outputs.ecs_admin_service }}
      ecs_borrower_service: ${{ steps.config.outputs.ecs_borrower_service }}
      ecs_migrations_task: ${{ steps.config.outputs.ecs_migrations_task }}
      app_secrets_arn: ${{ steps.config.outputs.app_secrets_arn }}
      uploads_bucket: ${{ steps.config.outputs.uploads_bucket }}
      admin_url: ${{ steps.config.outputs.admin_url }}
      backend_url: ${{ steps.config.outputs.backend_url }}
      borrower_url: ${{ steps.config.outputs.borrower_url }}
      pro_tenant_slug: ${{ steps.config.outputs.pro_tenant_slug }}
      pro_tenant_name: ${{ steps.config.outputs.pro_tenant_name }}
      pro_tenant_type: ${{ steps.config.outputs.pro_tenant_type }}
      pro_tenant_license_number: ${{ steps.config.outputs.pro_tenant_license_number }}
      pro_tenant_registration_number: ${{ steps.config.outputs.pro_tenant_registration_number }}
      pro_tenant_email: ${{ steps.config.outputs.pro_tenant_email }}
      pro_tenant_contact_number: ${{ steps.config.outputs.pro_tenant_contact_number }}
      pro_tenant_business_address: ${{ steps.config.outputs.pro_tenant_business_address }}
      seed_owner_email: ${{ steps.config.outputs.seed_owner_email }}
      seed_owner_name: ${{ steps.config.outputs.seed_owner_name }}
      platform_release_default: ${{ steps.config.outputs.platform_release_default }}
      borrower_release_default: ${{ steps.config.outputs.borrower_release_default }}
      backend_log_group: ${{ steps.config.outputs.backend_log_group }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine client config path
        id: client
        run: |
          CLIENT_ID="${{ github.event.inputs.client_id }}"
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "config_path=config/clients/$CLIENT_ID.yaml" >> "$GITHUB_OUTPUT"

      - name: Parse client config
        id: config
        env:
          CLIENT_CONFIG_PATH: ${{ steps.client.outputs.config_path }}
        run: |
          ruby -ryaml -e '
            cfg = YAML.load_file(ENV.fetch("CLIENT_CONFIG_PATH"))
            outputs = {
              "client_type" => cfg.fetch("client_type"),
              "github_environment" => cfg.dig("aws", "github_environment"),
              "aws_region" => cfg.dig("aws", "region"),
              "borrower_app" => cfg.fetch("borrower_app"),
              "ecr_backend" => cfg.dig("ecr", "backend_repository"),
              "ecr_admin" => cfg.dig("ecr", "admin_repository"),
              "ecr_borrower" => cfg.dig("ecr", "borrower_repository"),
              "ecs_cluster" => cfg.dig("ecs", "cluster"),
              "ecs_backend_service" => cfg.dig("ecs", "backend_service"),
              "ecs_admin_service" => cfg.dig("ecs", "admin_service"),
              "ecs_borrower_service" => cfg.dig("ecs", "borrower_service"),
              "ecs_migrations_task" => cfg.dig("ecs", "migrations_task"),
              "app_secrets_arn" => cfg.dig("secrets", "app_secrets_arn"),
              "uploads_bucket" => cfg.dig("storage", "uploads_bucket"),
              "admin_url" => "https://#{cfg.dig("domains", "admin")}",
              "backend_url" => "https://#{cfg.dig("domains", "api")}",
              "borrower_url" => "https://#{cfg.dig("domains", "borrower")}",
              "pro_tenant_slug" => cfg.dig("pro_tenant", "slug"),
              "pro_tenant_name" => cfg.dig("pro_tenant", "name"),
              "pro_tenant_type" => cfg.dig("pro_tenant", "type"),
              "pro_tenant_license_number" => cfg.dig("pro_tenant", "license_number"),
              "pro_tenant_registration_number" => cfg.dig("pro_tenant", "registration_number"),
              "pro_tenant_email" => cfg.dig("pro_tenant", "email"),
              "pro_tenant_contact_number" => cfg.dig("pro_tenant", "contact_number"),
              "pro_tenant_business_address" => cfg.dig("pro_tenant", "business_address"),
              "seed_owner_email" => cfg.dig("pro_tenant", "seed_owner_email"),
              "seed_owner_name" => cfg.dig("pro_tenant", "seed_owner_name"),
              "platform_release_default" => cfg.dig("deploy", "platform_release"),
              "borrower_release_default" => cfg.dig("deploy", "borrower_release"),
              "backend_log_group" => "/ecs/#{cfg.dig("ecs", "backend_service")}"
            }

            File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |f|
              outputs.each do |key, value|
                raise "Missing config value for #{key}" if value.nil? || value.to_s.empty?
                f.puts("#{key}=#{value}")
              end
            end
          '

  resolve-release:
    name: Resolve Semantic Versions
    runs-on: ubuntu-latest
    needs: load-config

    outputs:
      platform_version: ${{ steps.resolve.outputs.platform_version }}
      borrower_version: ${{ steps.resolve.outputs.borrower_version }}
      platform_ref: ${{ steps.resolve.outputs.platform_ref }}
      borrower_ref: ${{ steps.resolve.outputs.borrower_ref }}

    steps:
      - name: Resolve release refs
        id: resolve
        env:
          BORROWER_APP: ${{ needs.load-config.outputs.borrower_app }}
          PLATFORM_DEFAULT: ${{ needs.load-config.outputs.platform_release_default }}
          BORROWER_DEFAULT: ${{ needs.load-config.outputs.borrower_release_default }}
          PLATFORM_INPUT: ${{ github.event.inputs.platform_version }}
          BORROWER_INPUT: ${{ github.event.inputs.borrower_version }}
        run: |
          set -euo pipefail

          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'

          PLATFORM_VERSION="$PLATFORM_INPUT"
          if [ -z "$PLATFORM_VERSION" ]; then
            PLATFORM_VERSION="$PLATFORM_DEFAULT"
          fi

          BORROWER_VERSION="$BORROWER_INPUT"
          if [ -z "$BORROWER_VERSION" ]; then
            BORROWER_VERSION="$BORROWER_DEFAULT"
          fi
          if [ -z "$BORROWER_VERSION" ]; then
            BORROWER_VERSION="$PLATFORM_VERSION"
          fi

          if [ -z "$PLATFORM_VERSION" ]; then
            echo "platform_version is required either as workflow input or config/clients/<client>.yaml deploy.platform_release"
            exit 1
          fi

          if ! [[ "$PLATFORM_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "Invalid platform_version: $PLATFORM_VERSION"
            echo "Expected semantic version like 1.2.3 or 1.2.3-rc.1"
            exit 1
          fi

          if ! [[ "$BORROWER_VERSION" =~ $SEMVER_REGEX ]]; then
            echo "Invalid borrower_version: $BORROWER_VERSION"
            echo "Expected semantic version like 1.2.3 or 1.2.3-client.1"
            exit 1
          fi

          PLATFORM_REF="refs/tags/pro-platform-v$PLATFORM_VERSION"
          if [ "$BORROWER_VERSION" = "$PLATFORM_VERSION" ]; then
            BORROWER_REF="$PLATFORM_REF"
          else
            BORROWER_REF="refs/tags/pro-borrower-$BORROWER_APP-v$BORROWER_VERSION"
          fi

          echo "platform_version=$PLATFORM_VERSION" >> "$GITHUB_OUTPUT"
          echo "borrower_version=$BORROWER_VERSION" >> "$GITHUB_OUTPUT"
          echo "platform_ref=$PLATFORM_REF" >> "$GITHUB_OUTPUT"
          echo "borrower_ref=$BORROWER_REF" >> "$GITHUB_OUTPUT"

  build-backend:
    name: Build Backend Pro
    runs-on: ubuntu-latest
    needs: [load-config, resolve-release]
    environment: ${{ needs.load-config.outputs.github_environment }}
    env:
      AWS_REGION: ${{ needs.load-config.outputs.aws_region }}
      ECR_REPOSITORY_BACKEND: ${{ needs.load-config.outputs.ecr_backend }}
      PLATFORM_VERSION: ${{ needs.resolve-release.outputs.platform_version }}
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      needs.resolve-release.result == 'success' &&
      github.event.inputs.action != 'admin-only' &&
      github.event.inputs.action != 'borrower-only' &&
      github.event.inputs.action != 'db-migrate' &&
      github.event.inputs.action != 'db-seed' &&
      github.event.inputs.action != 'db-migrate-and-seed' &&
      github.event.inputs.action != 'db-reset-and-seed'

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.build.outputs.image || steps.deploy_only.outputs.image }}

    steps:
      - name: Checkout platform release
        uses: actions/checkout@v5
        if: github.event.inputs.action != 'deploy-only'
        with:
          ref: ${{ needs.resolve-release.outputs.platform_ref }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build
        if: github.event.inputs.action != 'deploy-only'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker build -f apps/backend_pro/Dockerfile \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION" .
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION" \
            "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION-$SHORT_SHA"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION-$SHORT_SHA"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Use semantic version image for deploy-only
        id: deploy_only
        if: github.event.inputs.action == 'deploy-only'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION" >> "$GITHUB_OUTPUT"

  build-admin:
    name: Build Admin Pro
    runs-on: ubuntu-latest
    needs: [load-config, resolve-release]
    environment: ${{ needs.load-config.outputs.github_environment }}
    env:
      AWS_REGION: ${{ needs.load-config.outputs.aws_region }}
      ECR_REPOSITORY_ADMIN: ${{ needs.load-config.outputs.ecr_admin }}
      ADMIN_URL: ${{ needs.load-config.outputs.admin_url }}
      BACKEND_URL: ${{ needs.load-config.outputs.backend_url }}
      PLATFORM_VERSION: ${{ needs.resolve-release.outputs.platform_version }}
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      needs.resolve-release.result == 'success' &&
      github.event.inputs.action != 'backend-only' &&
      github.event.inputs.action != 'borrower-only' &&
      github.event.inputs.action != 'db-migrate' &&
      github.event.inputs.action != 'db-seed' &&
      github.event.inputs.action != 'db-migrate-and-seed' &&
      github.event.inputs.action != 'db-reset-and-seed'

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.build.outputs.image || steps.deploy_only.outputs.image }}

    steps:
      - name: Checkout platform release
        uses: actions/checkout@v5
        if: github.event.inputs.action != 'deploy-only'
        with:
          ref: ${{ needs.resolve-release.outputs.platform_ref }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push admin image
        id: build
        if: github.event.inputs.action != 'deploy-only'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker build -f apps/admin_pro/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL="$BACKEND_URL" \
            --build-arg NEXT_PUBLIC_APP_URL="$ADMIN_URL" \
            --build-arg BACKEND_URL="$BACKEND_URL" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$PLATFORM_VERSION" .
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$PLATFORM_VERSION" \
            "$ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$PLATFORM_VERSION-$SHORT_SHA"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$PLATFORM_VERSION"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$PLATFORM_VERSION-$SHORT_SHA"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$PLATFORM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Use semantic version image for deploy-only
        id: deploy_only
        if: github.event.inputs.action == 'deploy-only'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_ADMIN:$PLATFORM_VERSION" >> "$GITHUB_OUTPUT"

  build-borrower:
    name: Build Borrower App
    runs-on: ubuntu-latest
    needs: [load-config, resolve-release]
    environment: ${{ needs.load-config.outputs.github_environment }}
    env:
      AWS_REGION: ${{ needs.load-config.outputs.aws_region }}
      BORROWER_APP: ${{ needs.load-config.outputs.borrower_app }}
      ECR_REPOSITORY_BORROWER: ${{ needs.load-config.outputs.ecr_borrower }}
      BORROWER_URL: ${{ needs.load-config.outputs.borrower_url }}
      BACKEND_URL: ${{ needs.load-config.outputs.backend_url }}
      BORROWER_VERSION: ${{ needs.resolve-release.outputs.borrower_version }}
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      needs.resolve-release.result == 'success' &&
      github.event.inputs.action != 'backend-only' &&
      github.event.inputs.action != 'admin-only' &&
      github.event.inputs.action != 'db-migrate' &&
      github.event.inputs.action != 'db-seed' &&
      github.event.inputs.action != 'db-migrate-and-seed' &&
      github.event.inputs.action != 'db-reset-and-seed'

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.build.outputs.image || steps.deploy_only.outputs.image }}

    steps:
      - name: Checkout borrower release
        uses: actions/checkout@v5
        if: github.event.inputs.action != 'deploy-only'
        with:
          ref: ${{ needs.resolve-release.outputs.borrower_ref }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push borrower image
        id: build
        if: github.event.inputs.action != 'deploy-only'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker build -f apps/borrower_pro/Dockerfile \
            --build-arg BORROWER_APP="$BORROWER_APP" \
            --build-arg NEXT_PUBLIC_APP_URL="$BORROWER_URL" \
            --build-arg NEXT_PUBLIC_BACKEND_URL="$BACKEND_URL" \
            --build-arg BACKEND_URL="$BACKEND_URL" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_BORROWER:$BORROWER_VERSION" .
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY_BORROWER:$BORROWER_VERSION" \
            "$ECR_REGISTRY/$ECR_REPOSITORY_BORROWER:$BORROWER_VERSION-$SHORT_SHA"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BORROWER:$BORROWER_VERSION"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BORROWER:$BORROWER_VERSION-$SHORT_SHA"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BORROWER:$BORROWER_VERSION" >> "$GITHUB_OUTPUT"

      - name: Use semantic version image for deploy-only
        id: deploy_only
        if: github.event.inputs.action == 'deploy-only'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BORROWER:$BORROWER_VERSION" >> "$GITHUB_OUTPUT"

  db-operations:
    name: Pro Client Database Operations
    runs-on: ubuntu-latest
    needs: [load-config, resolve-release]
    environment: ${{ needs.load-config.outputs.github_environment }}
    env:
      AWS_REGION: ${{ needs.load-config.outputs.aws_region }}
      ECR_REPOSITORY_BACKEND: ${{ needs.load-config.outputs.ecr_backend }}
      ECS_CLUSTER: ${{ needs.load-config.outputs.ecs_cluster }}
      ECS_SERVICE_BACKEND: ${{ needs.load-config.outputs.ecs_backend_service }}
      ECS_TASK_MIGRATIONS: ${{ needs.load-config.outputs.ecs_migrations_task }}
      PRO_TENANT_SLUG: ${{ needs.load-config.outputs.pro_tenant_slug }}
      PRO_TENANT_NAME: ${{ needs.load-config.outputs.pro_tenant_name }}
      PRO_TENANT_TYPE: ${{ needs.load-config.outputs.pro_tenant_type }}
      PRO_TENANT_LICENSE_NUMBER: ${{ needs.load-config.outputs.pro_tenant_license_number }}
      PRO_TENANT_REGISTRATION_NUMBER: ${{ needs.load-config.outputs.pro_tenant_registration_number }}
      PRO_TENANT_EMAIL: ${{ needs.load-config.outputs.pro_tenant_email }}
      PRO_TENANT_CONTACT_NUMBER: ${{ needs.load-config.outputs.pro_tenant_contact_number }}
      PRO_TENANT_BUSINESS_ADDRESS: ${{ needs.load-config.outputs.pro_tenant_business_address }}
      PRO_SEED_OWNER_EMAIL: ${{ needs.load-config.outputs.seed_owner_email }}
      PRO_SEED_OWNER_NAME: ${{ needs.load-config.outputs.seed_owner_name }}
      PROD_DEMO_OWNER_EMAIL: ${{ needs.load-config.outputs.seed_owner_email }}
      PROD_DEMO_OWNER_NAME: ${{ needs.load-config.outputs.seed_owner_name }}
      BACKEND_LOG_GROUP: ${{ needs.load-config.outputs.backend_log_group }}
      PLATFORM_VERSION: ${{ needs.resolve-release.outputs.platform_version }}
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      needs.resolve-release.result == 'success' &&
      (
        github.event.inputs.action == 'db-migrate' ||
        github.event.inputs.action == 'db-seed' ||
        github.event.inputs.action == 'db-migrate-and-seed' ||
        github.event.inputs.action == 'db-reset-and-seed' ||
        (
          github.event.inputs.action == 'full' &&
          github.event.inputs.skip_migrations != 'true'
        )
      )

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout platform release
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-release.outputs.platform_ref }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push migrations image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          docker build -f Dockerfile.migrations.pro \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION-migrations" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION-$SHORT_SHA-migrations" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest-migrations" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION-migrations"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$PLATFORM_VERSION-$SHORT_SHA-migrations"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest-migrations"

      - name: Determine operation type
        id: operation
        run: |
          ACTION="${{ github.event.inputs.action }}"

          if [ "$ACTION" = "db-migrate" ] || [ "$ACTION" = "db-migrate-and-seed" ] || [ "$ACTION" = "db-reset-and-seed" ] || [ "$ACTION" = "full" ]; then
            echo "run_migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_migrations=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$ACTION" = "db-seed" ] || [ "$ACTION" = "db-migrate-and-seed" ] || [ "$ACTION" = "db-reset-and-seed" ]; then
            echo "run_seed=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_seed=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$ACTION" = "db-reset-and-seed" ]; then
            echo "run_reset=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_reset=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run database task
        id: run-db-task
        run: |
          TASK_DEF_ARN=$(aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_TASK_MIGRATIONS }}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          SUBNETS=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BACKEND }}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output text | tr '\t' ',')

          SECURITY_GROUPS=$(aws ecs describe-services \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BACKEND }}" \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output text | tr '\t' ',')

          RUN_MIGRATIONS="${{ steps.operation.outputs.run_migrations }}"
          RUN_SEED="${{ steps.operation.outputs.run_seed }}"
          RUN_RESET="${{ steps.operation.outputs.run_reset }}"

          OVERRIDES='{"containerOverrides":[{"name":"migrations","environment":['
          ENV_VARS='{"name":"PRO_TENANT_SLUG","value":"${{ env.PRO_TENANT_SLUG }}"}'
          ENV_VARS="$ENV_VARS,"'{"name":"PRO_TENANT_NAME","value":"${{ env.PRO_TENANT_NAME }}"}'
          ENV_VARS="$ENV_VARS,"'{"name":"PRO_TENANT_TYPE","value":"${{ env.PRO_TENANT_TYPE }}"}'
          ENV_VARS="$ENV_VARS,"'{"name":"PRO_TENANT_LICENSE_NUMBER","value":"${{ env.PRO_TENANT_LICENSE_NUMBER }}"}'
          ENV_VARS="$ENV_VARS,"'{"name":"PRO_TENANT_REGISTRATION_NUMBER","value":"${{ env.PRO_TENANT_REGISTRATION_NUMBER }}"}'
          ENV_VARS="$ENV_VARS,"'{"name":"PRO_TENANT_EMAIL","value":"${{ env.PRO_TENANT_EMAIL }}"}'
          ENV_VARS="$ENV_VARS,"'{"name":"PRO_TENANT_CONTACT_NUMBER","value":"${{ env.PRO_TENANT_CONTACT_NUMBER }}"}'
          ENV_VARS="$ENV_VARS,"'{"name":"PRO_TENANT_BUSINESS_ADDRESS","value":"${{ env.PRO_TENANT_BUSINESS_ADDRESS }}"}'

          if [ "$RUN_MIGRATIONS" = "true" ]; then
            ENV_VARS="$ENV_VARS,"'{"name":"RUN_MIGRATIONS","value":"true"}'
          else
            ENV_VARS="$ENV_VARS,"'{"name":"SKIP_MIGRATIONS","value":"true"}'
          fi

          if [ "$RUN_RESET" = "true" ]; then
            ENV_VARS="$ENV_VARS,"'{"name":"RESET_DATABASE","value":"true"}'
          fi

          if [ "$RUN_SEED" = "true" ]; then
            ENV_VARS="$ENV_VARS,"'{"name":"SEED_DATABASE","value":"true"}'
            ENV_VARS="$ENV_VARS,"'{"name":"PRO_SEED_OWNER_EMAIL","value":"${{ env.PRO_SEED_OWNER_EMAIL }}"}'
            ENV_VARS="$ENV_VARS,"'{"name":"PRO_SEED_OWNER_NAME","value":"${{ env.PRO_SEED_OWNER_NAME }}"}'
            ENV_VARS="$ENV_VARS,"'{"name":"PROD_DEMO_OWNER_EMAIL","value":"${{ env.PROD_DEMO_OWNER_EMAIL }}"}'
            ENV_VARS="$ENV_VARS,"'{"name":"PROD_DEMO_OWNER_NAME","value":"${{ env.PROD_DEMO_OWNER_NAME }}"}'
          fi

          OVERRIDES="$OVERRIDES$ENV_VARS]}]}"

          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "$TASK_DEF_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SECURITY_GROUPS],assignPublicIp=DISABLED}" \
            --overrides "$OVERRIDES" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Wait for database task to complete
        run: |
          TASK_ARN="${{ steps.run-db-task.outputs.task_arn }}"
          TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')

          for i in {1..30}; do
            STATUS=$(aws ecs describe-tasks \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].lastStatus' \
              --output text)

            if [ "$STATUS" = "STOPPED" ]; then
              EXIT_CODE=$(aws ecs describe-tasks \
                --cluster "${{ env.ECS_CLUSTER }}" \
                --tasks "$TASK_ARN" \
                --query 'tasks[0].containers[0].exitCode' \
                --output text)

              aws logs get-log-events \
                --log-group-name "${{ env.BACKEND_LOG_GROUP }}" \
                --log-stream-name "migrations/migrations/$TASK_ID" \
                --limit 200 \
                --query 'events[*].message' \
                --output text 2>/dev/null || true

              if [ "$EXIT_CODE" = "0" ]; then
                exit 0
              fi

              exit 1
            fi

            sleep 10
          done

          echo "Database task timed out"
          exit 1

  deploy-backend:
    name: Deploy Backend Pro
    runs-on: ubuntu-latest
    needs: [load-config, build-backend, db-operations]
    environment: ${{ needs.load-config.outputs.github_environment }}
    env:
      AWS_REGION: ${{ needs.load-config.outputs.aws_region }}
      ECS_CLUSTER: ${{ needs.load-config.outputs.ecs_cluster }}
      ECS_SERVICE_BACKEND: ${{ needs.load-config.outputs.ecs_backend_service }}
      ADMIN_URL: ${{ needs.load-config.outputs.admin_url }}
      BORROWER_URL: ${{ needs.load-config.outputs.borrower_url }}
      PRO_TENANT_SLUG: ${{ needs.load-config.outputs.pro_tenant_slug }}
      UPLOADS_BUCKET: ${{ needs.load-config.outputs.uploads_bucket }}
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      needs.build-backend.result == 'success' &&
      (needs.db-operations.result == 'success' || needs.db-operations.result == 'skipped')

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_SERVICE_BACKEND }}" \
            --query taskDefinition > task-definition-backend.json

      - name: Update backend task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-backend.json
          container-name: backend
          image: ${{ needs.build-backend.outputs.image }}
          environment-variables: |
            UPLOAD_DIR=/tmp/uploads
            FRONTEND_URL=${{ env.ADMIN_URL }}
            CORS_ORIGINS=${{ env.ADMIN_URL }},${{ env.BORROWER_URL }}
            PRODUCT_MODE=pro
            PRO_TENANT_SLUG=${{ env.PRO_TENANT_SLUG }}
            STORAGE_TYPE=s3
            S3_BUCKET=${{ env.UPLOADS_BUCKET }}
            AWS_REGION=${{ env.AWS_REGION }}

      - name: Deploy backend task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_BACKEND }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Ensure backend service is running
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_BACKEND }}" \
            --desired-count 1 \
            --force-new-deployment > /dev/null
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BACKEND }}"

  deploy-admin:
    name: Deploy Admin Pro
    runs-on: ubuntu-latest
    needs: [load-config, build-admin]
    environment: ${{ needs.load-config.outputs.github_environment }}
    env:
      AWS_REGION: ${{ needs.load-config.outputs.aws_region }}
      ECS_CLUSTER: ${{ needs.load-config.outputs.ecs_cluster }}
      ECS_SERVICE_ADMIN: ${{ needs.load-config.outputs.ecs_admin_service }}
      BACKEND_URL: ${{ needs.load-config.outputs.backend_url }}
      ADMIN_URL: ${{ needs.load-config.outputs.admin_url }}
      APP_SECRETS_ARN: ${{ needs.load-config.outputs.app_secrets_arn }}
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      needs.build-admin.result == 'success'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current admin task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_SERVICE_ADMIN }}" \
            --query taskDefinition > task-definition-admin.json

      - name: Update admin task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-admin.json
          container-name: admin
          image: ${{ needs.build-admin.outputs.image }}
          environment-variables: |
            BACKEND_URL=${{ env.BACKEND_URL }}
            NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }}
            NEXT_PUBLIC_APP_URL=${{ env.ADMIN_URL }}
          secrets: |
            DATABASE_URL=${{ env.APP_SECRETS_ARN }}:database_url::
            BETTER_AUTH_SECRET=${{ env.APP_SECRETS_ARN }}:better_auth_secret::
            RESEND_API_KEY=${{ env.APP_SECRETS_ARN }}:resend_api_key::

      - name: Deploy admin task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_ADMIN }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Ensure admin service is running
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_ADMIN }}" \
            --desired-count 1 \
            --force-new-deployment > /dev/null
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_ADMIN }}"

  deploy-borrower:
    name: Deploy Borrower App
    runs-on: ubuntu-latest
    needs: [load-config, build-borrower]
    environment: ${{ needs.load-config.outputs.github_environment }}
    env:
      AWS_REGION: ${{ needs.load-config.outputs.aws_region }}
      ECS_CLUSTER: ${{ needs.load-config.outputs.ecs_cluster }}
      ECS_SERVICE_BORROWER: ${{ needs.load-config.outputs.ecs_borrower_service }}
      BACKEND_URL: ${{ needs.load-config.outputs.backend_url }}
      BORROWER_URL: ${{ needs.load-config.outputs.borrower_url }}
      APP_SECRETS_ARN: ${{ needs.load-config.outputs.app_secrets_arn }}
    if: |
      always() &&
      needs.load-config.result == 'success' &&
      needs.build-borrower.result == 'success'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current borrower task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ env.ECS_SERVICE_BORROWER }}" \
            --query taskDefinition > task-definition-borrower.json

      - name: Update borrower task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition-borrower.json
          container-name: borrower
          image: ${{ needs.build-borrower.outputs.image }}
          environment-variables: |
            BACKEND_URL=${{ env.BACKEND_URL }}
            NEXT_PUBLIC_BACKEND_URL=${{ env.BACKEND_URL }}
            NEXT_PUBLIC_APP_URL=${{ env.BORROWER_URL }}
          secrets: |
            DATABASE_URL=${{ env.APP_SECRETS_ARN }}:database_url::
            BETTER_AUTH_SECRET=${{ env.APP_SECRETS_ARN }}:better_auth_secret::
            RESEND_API_KEY=${{ env.APP_SECRETS_ARN }}:resend_api_key::

      - name: Deploy borrower task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_BORROWER }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Ensure borrower service is running
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE_BORROWER }}" \
            --desired-count 1 \
            --force-new-deployment > /dev/null
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE_BORROWER }}"

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs:
      [
        load-config,
        resolve-release,
        build-backend,
        build-admin,
        build-borrower,
        db-operations,
        deploy-backend,
        deploy-admin,
        deploy-borrower,
      ]
    if: always()

    steps:
      - name: Deployment summary
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Client: ${{ needs.load-config.outputs.client_id }}"
          echo "Action: ${{ github.event.inputs.action }}"
          echo "Platform version: ${{ needs.resolve-release.outputs.platform_version }}"
          echo "Borrower version: ${{ needs.resolve-release.outputs.borrower_version }}"
          echo "Build backend: ${{ needs.build-backend.result }}"
          echo "Build admin: ${{ needs.build-admin.result }}"
          echo "Build borrower: ${{ needs.build-borrower.result }}"
          echo "DB operations: ${{ needs.db-operations.result }}"
          echo "Deploy backend: ${{ needs.deploy-backend.result }}"
          echo "Deploy admin: ${{ needs.deploy-admin.result }}"
          echo "Deploy borrower: ${{ needs.deploy-borrower.result }}"
