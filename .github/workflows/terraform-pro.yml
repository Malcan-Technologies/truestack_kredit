name: Terraform Pro Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/pro/**"
      - ".github/workflows/terraform-pro.yml"
  workflow_dispatch:
    inputs:
      client_id:
        description: "Pro client to target"
        required: true
        default: "demo-client"
        type: string
      action:
        description: "Terraform action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TF_VERSION: "1.6.0"

jobs:
  terraform:
    name: Terraform Pro
    runs-on: ubuntu-latest
    environment: pro-demo-client

    permissions:
      id-token: write
      contents: read
      pull-requests: write

    env:
      CLIENT_ID: ${{ github.event.inputs.client_id || 'demo-client' }}

    defaults:
      run:
        working-directory: terraform/pro/clients/${{ github.event.inputs.client_id || 'demo-client' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan' || github.event.inputs.action == ''
        run: terraform plan -no-color -input=false -var-file=${{ env.CLIENT_ID }}.tfvars -out=tfplan
        continue-on-error: true

      - name: Update Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Format and Style \`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization \`${{ steps.init.outcome }}\`
            #### Terraform Validation \`${{ steps.validate.outcome }}\`
            #### Terraform Plan \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Target client: \`${process.env.CLIENT_ID}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve -input=false -var-file=${{ env.CLIENT_ID }}.tfvars

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve -input=false -var-file=${{ env.CLIENT_ID }}.tfvars
