client_id: client-id
client_type: external
borrower_app: client-folder-name

aws:
  account_id: "123456789012"
  region: ap-southeast-5
  github_environment: pro-client-id

deploy:
  auto_deploy: false
  # Git tag: pro-platform-v<platform_release>
  platform_release: 1.0.0
  # Git tag: pro-borrower-<borrower_app>-v<borrower_release>
  # If omitted in deploy-pro.yml input, borrower_release falls back to this value, then platform_release.
  borrower_release: 1.0.0

ecr:
  backend_repository: truekredit-client-id-backend-pro
  admin_repository: truekredit-client-id-admin-pro
  borrower_repository: truekredit-client-id-borrower

ecs:
  cluster: truekredit-client-id
  backend_service: truekredit-client-id-backend
  admin_service: truekredit-client-id-admin
  borrower_service: truekredit-client-id-borrower
  migrations_task: truekredit-client-id-migrations

secrets:
  app_secrets_arn: arn:aws:secretsmanager:ap-southeast-5:123456789012:secret:truekredit-client-id

storage:
  uploads_bucket: truekredit-uploads-client-id

domains:
  # Public client-facing hostnames. These remain the source of truth even when DNS/proxying is handled by Cloudflare.
  admin: admin.client-id.example.com
  api: api.client-id.example.com
  borrower: app.client-id.example.com

pro_tenant:
  slug: client-id
  name: Client Name Sdn Bhd
  type: PPW
  license_number: PPW/KL/2024/001
  registration_number: "202401012345"
  email: info@client-id.example.com
  contact_number: "+60312345678"
  business_address: 123 Jalan Client, 50000 Kuala Lumpur
  seed_owner_email: admin@client-id.example.com
  seed_owner_name: Client Admin

enabled_modules:
  - origination
  - repayments
  - attestation
  - signing
