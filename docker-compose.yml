version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: kredit-postgres
    environment:
      POSTGRES_USER: kredit
      POSTGRES_PASSWORD: kredit_dev
      POSTGRES_DB: kredit_dev
    # Host 5433 avoids clashes with another PostgreSQL already bound to 5432 (common on dev machines).
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kredit -d kredit_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TrueKredit Pro database (separate from SaaS)
  postgres_pro:
    image: postgres:16
    container_name: kredit-postgres-pro
    environment:
      POSTGRES_USER: kredit_pro
      POSTGRES_PASSWORD: kredit_pro_dev
      POSTGRES_DB: kredit_pro_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_pro_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kredit_pro -d kredit_pro_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Local S3 (MinIO) for file storage testing
  minio:
    image: minio/minio
    container_name: kredit-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  postgres_pro_data:
  minio_data:
